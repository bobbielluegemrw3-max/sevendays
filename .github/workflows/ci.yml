name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    # 二重支払い防止テスト(packages/ledger/test/concurrency.test.ts)は
    # **真の並行性**を要求するため PGlite(単一接続)では動かせない。実 Postgres を
    # 立て、TEST_DATABASE_URL を与えて初めて実行される(L-5)。
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sevendays_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/sevendays_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # マイグレーションを実 Postgres へ適用(PGlite版 test-db.ts と同じ手順)
      - name: Apply schema to test database
        run: node scripts/apply-test-schema.mjs

      # --force: turbo のキャッシュヒットで「テストを1件も実行しないのに PASS」に
      # なるのを防ぐ。CI は毎回実走させる(ゲート判定はキャッシュを信じない)
      # ★`pnpm test -- --force` と書くと `--` 以降が下位タスク(vitest)へ転送され
      #   `CACError: Unknown option --force` で落ちる。turbo のフラグとして渡すこと
      - name: Test
        run: pnpm exec turbo run test --force

      # 二重支払いテストが実際に実行されたことを確認する。
      # skip されていても vitest は成功扱いになるため、スキップ=合格のすり抜けを塞ぐ
      - name: Verify double-spend test actually ran
        run: pnpm --filter @sevendays/ledger exec vitest run test/concurrency.test.ts --reporter=verbose 2>&1 | tee /tmp/dbl.log && grep -q "concurrent double-spend prevention" /tmp/dbl.log && ! grep -qi "skipped" /tmp/dbl.log

      - name: Forbidden API check (Completion Gate G8)
        run: pnpm check:forbidden-apis

      # Remaining gates — extended in later phases:
      # - Client-side financial logic / Service Role Key bundle check (Phase 13)
